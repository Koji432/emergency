<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS ロック画面風 緊急モード (水色・緊迫感版)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* 見やすい水色のグラデーション */
            background: linear-gradient(135deg, #E0F7FA 0%, #B3E5FC 100%);
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 60px;
            overflow: hidden;
            user-select: none;
        }

        /* ステータスバー (上部UI) */
        .status-bar {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            padding: 0 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            color: #333;
        }

        /* バッテリーUI */
        .battery-container {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .battery-icon {
            width: 25px;
            height: 12px;
            border: 1px solid rgba(0, 0, 0, 0.8);
            border-radius: 4px;
            padding: 1px;
            position: relative;
            display: flex;
            align-items: center;
        }

            /* バッテリーのプラス端子部分 */
            .battery-icon::after {
                content: '';
                position: absolute;
                right: -3px;
                top: 3px;
                width: 2px;
                height: 4px;
                background-color: rgba(0, 0, 0, 0.8);
                border-radius: 0 1px 1px 0;
            }

        /* 残量1% (赤色) */
        .battery-level {
            width: 1%;
            height: 100%;
            background-color: #ff3b30;
            border-radius: 1px;
        }

        /* ロックアイコン (画面中央上部) */
        .lock-icon {
            position: absolute;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 14px;
            border: 2px solid #333;
            border-radius: 3px;
            margin-top: 10px;
        }

            .lock-icon::before {
                content: '';
                position: absolute;
                top: -9px;
                left: 2px;
                width: 10px;
                height: 10px;
                border: 2px solid #333;
                border-bottom: none;
                border-radius: 5px 5px 0 0;
            }

        /* 日時表示 */
        .clock-container {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
            z-index: 10;
            color: #333;
        }

        .date {
            font-size: 19px;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .time {
            font-size: 80px;
            font-weight: 200;
            line-height: 1;
        }

        /* 通知センター */
        .notification-container {
            /* 横幅を広げて長く表示 */
            width: 95%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .notification {
            background: #ffffff;
            border-radius: 18px; /* 角丸を少し強調 */
            /* 内側の余白を増やして見やすく */
            padding: 20px 22px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .notif-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px; /* 見出しと本文の隙間を少し広く */
            font-size: 12px;
            font-weight: 600;
        }

        .notif-title-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 700;
        }

        .badge-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* 緊急速報の赤丸 (真っ赤で点滅アニメーション) */
        .badge-emergency {
            background-color: #ff1744;
            animation: alarm_blink 0.5s infinite alternate;
        }
        /* 緊急速報の見出しテキスト */
        .text-emergency {
            color: #ff1744;
            font-weight: 800;
        }

        /* お知らせのオレンジ丸 */
        .badge-info {
            background-color: #ff6d00;
        }
        /* お知らせの見出しテキスト */
        .text-info {
            color: #ff6d00;
            font-weight: 700;
        }

        .notif-time {
            color: rgba(0, 0, 0, 0.6);
        }

        .notif-body {
            /* フォントサイズを微調整し、より読みやすく */
            font-size: 15.5px;
            line-height: 1.5;
            color: #111;
            font-weight: 500;
        }

        /* 警告バッジの点滅アニメーション */
        @keyframes alarm_blink {
            from {
                opacity: 1;
            }

            to {
                opacity: 0.2;
            }
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <div class="status-left">圏外</div>
        <div class="status-right">
            <div class="battery-container">
                <span>1%</span>
                <div class="battery-icon">
                    <div class="battery-level"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="lock-icon"></div>

    <div class="clock-container">
        <div class="date">6月4日(木)</div>
        <div class="time">09:40</div>
    </div>

    <div class="notification-container">
        <div class="notification">
            <div class="notif-header">
                <div class="notif-title-badge">
                    <div class="badge-dot badge-emergency"></div>
                    <span class="text-emergency">緊急速報</span>
                </div>
                <span class="notif-time">今</span>
            </div>
            <div class="notif-body">
                原因不明の大災害が発生しました。注意してください。
            </div>
        </div>

        <div class="notification">
            <div class="notif-header">
                <div class="notif-title-badge">
                    <div class="badge-dot badge-info"></div>
                    <span class="text-info">お知らせ</span>
                </div>
                <span class="notif-time">今</span>
            </div>
            <div class="notif-body">
                救助が来るのはあと三か月後です。
            </div>
        </div>
    </div>

</body>
</html>
